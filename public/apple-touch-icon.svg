<!--
  Apple touch icon — 180×180 recommended.
  iOS masks to a rounded square automatically; this icon is designed
  edge-to-edge so the mask doesn't clip the brand mark.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 180 180"
  width="180"
  height="180"
>
  <rect width="180" height="180" fill="#01696F" />
  <rect
    x="46"
    y="46"
    width="56"
    height="56"
    stroke="#F8F7F4"
    stroke-width="10"
    fill="none"
  />
  <line
    x1="102"
    y1="74"
    x2="102"
    y2="134"
    stroke="#F8F7F4"
    stroke-width="10"
  />
</svg>
